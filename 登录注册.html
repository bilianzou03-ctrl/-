<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录/注册</title>
  <style>
    body {
      font-family: "Microsoft Yahei", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 50px auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .toggle-btn {
      background: none;
      color: #007bff;
      text-decoration: underline;
      margin-top: 10px;
      display: block;
      text-align: center;
      border: none;
      cursor: pointer;
    }
    /* 初始隐藏注册表单 */
    #register-form {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 登录表单 -->
    <form id="login-form">
      <h2>登录</h2>
      <div class="form-group">
        <label for="login-username">用户名：</label>
        <input type="text" id="login-username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="login-password">密码：</label>
        <input type="password" id="login-password" placeholder="请输入密码">
      </div>
      <button type="submit">登录</button>
      <button type="button" class="toggle-btn" id="to-register">没有账号？去注册</button>
    </form>

    <!-- 注册表单 -->
    <form id="register-form">
      <h2>注册</h2>
      <div class="form-group">
        <label for="register-username">用户名：</label>
        <input type="text" id="register-username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="register-password">密码：</label>
        <input type="password" id="register-password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label for="register-repassword">确认密码：</label>
        <input type="password" id="register-repassword" placeholder="请再次输入密码">
      </div>
      <button type="submit">注册</button>
      <button type="button" class="toggle-btn" id="to-login">已有账号？去登录</button>
    </form>
  </div>

  <script>
    // 获取切换按钮
    const toRegisterBtn = document.getElementById('to-register');
    const toLoginBtn = document.getElementById('to-login');
    // 获取表单
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    // 点击“去注册”，隐藏登录表单，显示注册表单
    toRegisterBtn.addEventListener('click', () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
    });

    // 点击“去登录”，隐藏注册表单，显示登录表单
    toLoginBtn.addEventListener('click', () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
    });

    // 登录表单提交（示例：仅打印，实际需对接后端）
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault(); // 阻止默认提交
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      console.log('登录：用户名', username, '密码', password);
      alert('登录成功（示例，实际需对接后端）');
    });

    // 注册表单提交（示例：仅打印，实际需对接后端）
    registerForm.addEventListener('submit', (e) => {
      e.preventDefault(); // 阻止默认提交
      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const repassword = document.getElementById('register-repassword').value;
      if (password !== repassword) {
        alert('两次密码不一致，请重新输入');
        return;
      }
      console.log('注册：用户名', username, '密码', password);
      alert('注册成功（示例，实际需对接后端）');
    });
  </script>
</body>
</html>
