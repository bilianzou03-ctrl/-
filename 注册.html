<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号</title>
    <style>
        /* 全局基础：与登录页一致的浅绿色背景 + 粒子点缀 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #e8f5e9; /* 浅绿色背景，与登录页一致 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 粒子背景：淡绿色小圆点，漂浮动画（与登录页一致） */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background-color: rgba(102, 187, 106, 0.2); /* 淡绿色半透明粒子 */
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }

        /* 注册表单：白色卡片 + 圆角 + 阴影（与登录页结构一致） */
        .register-form {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .register-form h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* 表单项：输入框样式（与登录页一致） */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #66bb6a; /* 聚焦时绿色边框，与登录页一致 */
            box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.2);
        }

        /* 错误提示：红色文字（保留原有逻辑） */
        .error-tip {
            color: #ff4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        /* 注册按钮：黄色纯色 + hover效果（与登录页按钮风格一致） */
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #ffd600; /* 黄色按钮，与登录页按钮一致 */
            border: none;
            border-radius: 8px;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        .btn:hover {
            background-color: #ffca28; /* hover时加深黄色 */
            transform: translateY(-2px); /* 轻微上浮，增强交互感 */
        }

        /* 登录链接：绿色文字（与登录页一致） */
        .login-link {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .login-link a {
            color: #000000; /* 绿色链接，与登录页一致 */
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 粒子背景容器（原有结构保留） -->
    <div class="particles" id="particles"></div>

    <!-- 注册表单（原有结构完全保留） -->
    <form class="register-form" id="registerForm">
        <h2>创建账号</h2>
        <div class="form-group">
            <label for="regUsername">用户名</label>
            <input type="text" id="regUsername" required placeholder="请输入用户名">
            <div class="error-tip" id="userError">用户名已存在</div>
        </div>
        <div class="form-group">
            <label for="regPassword">密码</label>
            <input type="password" id="regPassword" required placeholder="6-12位字母/数字" pattern="^[a-zA-Z0-9]{6,12}$">
        </div>
        <div class="form-group">
            <label for="regConfirmPwd">确认密码</label>
            <input type="password" id="regConfirmPwd" required placeholder="请再次输入密码">
            <div class="error-tip" id="pwdError">两次密码不一致</div>
        </div>
        <button type="submit" class="btn">注册</button>
        <div class="login-link">已有账号？<a href="登录.html">去登录</a></div>
    </form>

    <!-- 粒子背景生成JS（原有逻辑保留） -->
    <script>
        const particles = document.getElementById('particles');
        const particleCount = 50;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 5}s`;
            const size = 3 + Math.random() * 7;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particles.appendChild(particle);
        }
    </script>

    <!-- 原有注册功能逻辑（完全保留） -->
    <script>
        const registerForm = document.getElementById('registerForm');
        const regUsername = document.getElementById('regUsername');
        const regPassword = document.getElementById('regPassword');
        const regConfirmPwd = document.getElementById('regConfirmPwd');
        const userError = document.getElementById('userError');
        const pwdError = document.getElementById('pwdError');

        const getUsers = () => JSON.parse(localStorage.getItem('users')) || [];

        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = regUsername.value.trim();
            const password = regPassword.value;
            const confirmPwd = regConfirmPwd.value;
            const users = getUsers();

            if (users.some(user => user.username === username)) {
                userError.style.display = 'block';
                return;
            }
            userError.style.display = 'none';

            if (password !== confirmPwd) {
                pwdError.style.display = 'block';
                return;
            }
            pwdError.style.display = 'none';

            const newUser = {
                username: username,
                password: password,
                nickname: username,
                gender: '男',
                birthday: '2000-01-01',
                intro: '热爱生活，喜欢分享～',
                avatar: 'https://via.placeholder.com/120/ffcc33/333?text=头像',
                signDays: 0,
                lastSignDate: '',
                registerDate: new Date().toISOString(),
                posts: []
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            alert('注册成功！请登录');
            window.location.href = '登录.html';
        });
    </script>
</body>
</html>
