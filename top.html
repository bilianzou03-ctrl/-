<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>导航栏</title>
    <!-- 保留你原有的CSS -->
    <style>
        body { margin: 0; background-color: #309600; }
        table { width: 80%; margin: 0 auto; }
        td { text-align: center; padding: 8px 0; }
        a { color: black; text-decoration: none; font-size: 16px; font-weight: bold; }
        a:hover { color: #fff; }
    </style>
</head>
<body>
    <table>
        <tr>
            <td><a href="index.html" target="mainFrame">首页</a></td>
            <td><a href="个人资料.html" target="mainFrame">个人资料</a></td>
            <td><a href="妖精档案.html" target="mainFrame">妖精档案</a></td>
            <td><a href="论坛主页.html" target="mainFrame">论坛主页</a></td>
            <td><a href="众生之门.html" target="mainFrame">众生之门</a></td>
            <td><a href="签到福利.html" target="mainFrame">签到福利</a></td>
            <td><a href="设置.html" target="mainFrame">设置</a></td> <!-- 新增 -->
            <td><a href="登录.html" target="mainFrame" id="loginLink">登录</a></td>
        </tr>
    </table>

    <script>
        const loginLink = document.getElementById('loginLink');
        const isLogin = localStorage.getItem('isLogin') === 'true';

        if (isLogin) {
            loginLink.textContent = '退出登录';
            loginLink.href = 'javascript:;';
            loginLink.addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    localStorage.removeItem('isLogin');
                    localStorage.removeItem('currentUser');
                    window.parent.mainFrame.location.href = 'index.html';
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
