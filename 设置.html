<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号设置</title>
    <style>
        /* 全局基础：浅绿色背景 + 统一风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #e8f5e9; /* 浅绿色背景，与其他页面统一 */
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 2rem;
            color: #000000; /* 深绿色标题 */
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #c8e6c9;
        }

        /* 卡片通用样式：白色背景 + 圆角 + 绿色左边框 + hover动效 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #4caf50; /* 主题绿色左侧边框 */
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-3px); /* hover时轻微上浮，增强交互感 */
        }

        /* 卡片标题：图标 + 文字 */
        .card-title {
            font-size: 1.3rem;
            color: #2e7d32;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .card-title i {
            color: #4caf50;
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* 信息项：标签 + 内容 */
        .info-item {
            display: flex;
            margin-bottom: 12px;
            color: #555;
        }
        .info-label {
            width: 120px;
            font-weight: bold;
            color: #333;
        }

        /* 帖子列表样式 */
        .posts-list {
            list-style: none;
        }
        .post-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #4caf50;
        }
        .post-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #2e7d32;
        }
        .post-meta {
            font-size: 0.9rem;
            color: #666;
        }

        /* 未登录提示 */
        .login-tip {
            text-align: center;
            color: #ff4444;
            font-size: 1.2rem;
            margin: 50px 0;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .login-link {
            color: #4caf50;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <h1 class="page-title">账号设置</h1>

        <!-- 未登录提示 -->
        <div id="loginTip" class="login-tip" style="display: none;">
            请先<a href="登录.html" class="login-link">登录</a>查看账号信息
        </div>

        <!-- 已登录内容：三个独立卡片 -->
        <div id="settingContent" style="display: none;">
            <!-- 基础信息卡片 -->
            <div class="card">
                <h2 class="card-title"><i class="fa fa-user"></i> 基础信息</h2>
                <div class="info-item">
                    <div class="info-label">用户名</div>
                    <div id="info-username">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">昵称</div>
                    <div id="info-nickname">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">注册时间</div>
                    <div id="info-registerDate">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">注册天数</div>
                    <div id="info-registerDays">--</div>
                </div>
            </div>

            <!-- 签到信息卡片 -->
            <div class="card">
                <h2 class="card-title"><i class="fa fa-calendar-check-o"></i> 签到信息</h2>
                <div class="info-item">
                    <div class="info-label">累计签到</div>
                    <div id="info-signDays">0 天</div>
                </div>
                <div class="info-item">
                    <div class="info-label">最后签到</div>
                    <div id="info-lastSign">未签到</div>
                </div>
            </div>

            <!-- 我的帖子卡片 -->
            <div class="card">
                <h2 class="card-title"><i class="fa fa-file-text-o"></i> 我的帖子</h2>
                <div id="myPosts">
                    <ul class="posts-list" id="postsList">
                        <!-- 动态渲染帖子 -->
                    </ul>
                    <div id="noPosts" style="display: none; color: #666; padding: 15px; background: #f9f9f9; border-radius: 8px;">暂无发布的帖子</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 粒子动画JS（若有需要，保持原有引用） -->
    <script src="你的动画JS文件名.js"></script>

    <!-- 设置页面逻辑（功能不变） -->
    <script>
        const loginTip = document.getElementById('loginTip');
        const settingContent = document.getElementById('settingContent');
        const getCurrentUser = () => JSON.parse(localStorage.getItem('currentUser')) || null;
        const getPosts = () => JSON.parse(localStorage.getItem('posts')) || [];
        const isLogin = localStorage.getItem('isLogin') === 'true';
        const currentUser = getCurrentUser();

        const getDayDiff = (startDateStr) => {
            const startDate = new Date(startDateStr);
            const endDate = new Date();
            const timeDiff = endDate - startDate;
            return Math.floor(timeDiff / (1000 * 60 * 60 * 24));
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '未设置';
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        };

        window.onload = function() {
            if (!isLogin || !currentUser) {
                loginTip.style.display = 'block';
                settingContent.style.display = 'none';
                return;
            }

            loginTip.style.display = 'none';
            settingContent.style.display = 'block';

            // 填充基础信息
            document.getElementById('info-username').textContent = currentUser.username;
            document.getElementById('info-nickname').textContent = currentUser.nickname;
            document.getElementById('info-registerDate').textContent = formatDate(currentUser.registerDate);
            document.getElementById('info-registerDays').textContent = getDayDiff(currentUser.registerDate) + ' 天';

            // 填充签到信息
            document.getElementById('info-signDays').textContent = currentUser.signDays + ' 天';
            document.getElementById('info-lastSign').textContent = currentUser.lastSignDate 
                ? formatDate(currentUser.lastSignDate) 
                : '未签到';

            // 填充我的帖子
            const posts = getPosts();
            const myPosts = posts.filter(post => post.author === currentUser.username);
            const postsList = document.getElementById('postsList');
            const noPosts = document.getElementById('noPosts');

            if (myPosts.length === 0) {
                noPosts.style.display = 'block';
                postsList.innerHTML = '';
                return;
            }

            noPosts.style.display = 'none';
            postsList.innerHTML = myPosts.map(post => `
                <li class="post-item">
                    <div class="post-title">${post.title}</div>
                    <div class="post-meta">发布时间：${post.time} | 点赞：${post.likes} | 评论：${post.comments.length}</div>
                </li>
            `).join('');
        };
    </script>
</body>
</html>
