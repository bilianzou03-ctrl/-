<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互动文字动画</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- Tailwind配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4ade80', // 浅绿色
            cozy: '#16a34a',    // 温馨绿色
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.8s ease-out forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.8)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            }
          }
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .text-shadow {
        text-shadow: 0 2px 10px rgba(74, 222, 128, 0.2);
      }
      .cozy-shadow {
        text-shadow: 0 4px 20px rgba(22, 163, 74, 0.3);
      }
      .clickable {
        cursor: pointer;
        user-select: none;
        transition: all 0.3s ease;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-green-50 to-teal-50 min-h-screen flex items-center justify-center font-inter p-4 relative overflow-hidden transition-colors duration-700">
  <!-- 背景装饰元素 -->
  <div class="absolute inset-0 overflow-hidden -z-10">
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/3 -left-20 w-60 h-60 bg-cozy/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-52 h-52 bg-primary/5 rounded-full blur-3xl"></div>
  </div>
  
  <!-- 主要内容 -->
  <div id="main-content" class="text-center">
    <!-- 初始文字 -->
    <div id="initial-text" class="text-[clamp(2rem,5vw,4rem)] font-bold text-primary text-shadow animate-float clickable">
      哈哈这里什么也没有
    </div>
    
    <!-- 最终文字 (初始隐藏) -->
    <div id="final-text" class="hidden animate-fade-in">
      <div class="text-[clamp(2.5rem,6vw,5rem)] font-bold text-cozy cozy-shadow">
        该休息了
      </div>
      <div class="mt-6 flex justify-center">
        <div class="w-24 h-24 rounded-full bg-cozy/20 flex items-center justify-center animate-pulse-slow">
          <i class="fa fa-bed text-4xl text-cozy"></i>
        </div>
      </div>
      <p class="mt-6 text-gray-600 max-w-md mx-auto">
        眼睛需要休息，心灵需要放松，给自己一点时间，让美好重新生长
      </p>
    </div>
  </div>
  
  <!-- 点击提示 (初始显示，点击后隐藏) -->
  <div id="click-hint" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 text-gray-500 text-sm opacity-70">
    <i class="fa fa-hand-pointer-o mr-1"></i> 点击文字看看会发生什么
  </div>
  
  <script>
    // 获取DOM元素
    const initialText = document.getElementById('initial-text');
    const finalText = document.getElementById('final-text');
    const clickHint = document.getElementById('click-hint');
    
    // 点击计数器
    let clickCount = 0;
    
    // 初始字体大小 (使用rem单位)
    let initialFontSize = 4; // 等效于text-4xl
    let currentFontSize = initialFontSize;
    
    // 字体缩小步长
    const fontSizeStep = 0.5;
    
    // 最小字体大小阈值 (第三次点击前)
    const minFontSize = 2; // 等效于text-2xl
    
    // 点击事件处理
    initialText.addEventListener('click', () => {
      // 增加点击计数
      clickCount++;
      
      // 隐藏点击提示
      clickHint.classList.add('opacity-0');
      setTimeout(() => {
        clickHint.classList.add('hidden');
      }, 300);
      
      // 检查是否达到第三次点击
      if (clickCount >= 3) {
        // 显示最终文字
        initialText.classList.add('hidden');
        finalText.classList.remove('hidden');
        
        // 添加页面背景变化动画
        document.body.classList.remove('from-green-50', 'to-teal-50');
        document.body.classList.add('from-teal-100', 'to-green-100');
        
        return;
      }
      
      // 减小字体大小
      currentFontSize = Math.max(minFontSize, currentFontSize - fontSizeStep);
      
      // 更新字体大小
      initialText.style.fontSize = `${currentFontSize}rem`;
      
      // 添加点击动画
      initialText.classList.add('scale-90', 'opacity-70');
      setTimeout(() => {
        initialText.classList.remove('scale-90', 'opacity-70');
      }, 200);
    });
  </script>
</body>
</html>
